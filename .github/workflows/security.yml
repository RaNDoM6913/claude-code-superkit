name: AgentShield Security Scan

on:
  push:
    paths:
      - 'packages/core/**'
      - 'packages/codex/**'
      - 'packages/extras/**'
      - 'packages/stack-agents/**'
      - 'packages/stack-hooks/**'
      - 'packages/showcase/**'
      - 'setup.sh'
  pull_request:
    paths:
      - 'packages/**'
      - 'setup.sh'

# NOTE: AgentShield produces false positives on security-focused agent files.
# Our security-scanner agent DESCRIBES dangerous patterns (--no-verify, DROP TABLE,
# ignore previous instructions) to DETECT them — AgentShield flags these descriptions
# as actual threats. Until AgentShield supports .agentshieldignore or context-aware
# scanning, we run in advisory mode (fail-on-findings: false) with high severity.

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan core package
        uses: affaan-m/agentshield@v1
        with:
          path: "packages/core"
          min-severity: "high"
          fail-on-findings: "false"

      - name: Scan showcase
        uses: affaan-m/agentshield@v1
        with:
          path: "packages/showcase/.claude"
          min-severity: "high"
          fail-on-findings: "false"
